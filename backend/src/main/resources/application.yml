spring:
  application:
    name: argus

  # Default to the `dev` profile (mock model, no Ollama). On the Mac Mini run with
  # --spring.profiles.active=prod to route the Model Gateway to Gemma via Ollama.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Agents run on virtual threads (Loom) — @Scheduled tasks execute on virtual threads.
  threads:
    virtual:
      enabled: true

  # Postgres 18 (pgvector) — see docker-compose.yml. Local defaults match the
  # compose defaults so `mvn spring-boot:run` works without exporting env vars;
  # the Mini supplies real values via its own .env. dev/prod profiles arrive in Story 1.4.
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:argus}
    username: ${POSTGRES_USER:argus}
    password: ${POSTGRES_PASSWORD:argus}

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema — Hibernate NEVER generates it
    open-in-view: false

  flyway:
    enabled: true             # migrations in classpath:db/migration (V<n>__*.sql)

  mvc:
    problemdetails:
      enabled: true           # framework errors rendered as RFC 9457 problem+json

  # Brokerage statement PDFs (Story 3.1) run a few MB — the Spring 1MB default rejects
  # them. The portfolio import controller also enforces its own byte ceiling so the limit
  # is testable via MockMvc (which bypasses the servlet multipart resolver).
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # We use Redis only via StringRedisTemplate (streams) — no Spring Data Redis repositories.
      # Disabling repo scanning avoids the JPA/Redis multi-store "could not identify store" noise.
      repositories:
        enabled: false

  # Model provider selector: Argus uses Ollama (local) as the Spring-AI-autoconfigured chat model.
  # Anthropic (Claude Haiku, Story 7.3) is built manually + key-gated in HaikuConfig, so its
  # chat autoconfig is kept OFF here (it is mutually exclusive with Ollama's, and with no key it
  # would otherwise try to build a client and fail context startup).
  ai:
    model:
      chat: ollama

# Agent 1 news ingestion (Story 4.1, FR-8). Cadence-gated: ≤5 min in regular hours, ≤15 min off-hours.
# Finnhub is key-gated (argus.finnhub.api-key); GDELT + RSS are free/keyless and on by default.
argus:
  news:
    gdelt:
      enabled: ${ARGUS_NEWS_GDELT_ENABLED:true}
    rss:
      feeds:
        - https://feeds.a.dj.com/rss/RSSMarketsMain.xml
        - https://www.cnbc.com/id/100003114/device/rss/rss.html
  # Claude Haiku escalation/fallback (Story 7.3, FR-32). Key-gated: with no ANTHROPIC_API_KEY the
  # gateway's HaikuFallback is "unavailable" (escalation → 503) and Argus runs fully local. An empty
  # default is deliberate — it must read blank (not falsely "configured") when the env var is unset.
  haiku:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ARGUS_HAIKU_MODEL:claude-haiku-4-5-20251001}
    max-tokens: 1024
    temperature: 0.7

  # Web Push / VAPID (Epic 8, FR-17). Bound to PushProperties as argus.push.vapid.*. Empty defaults
  # are deliberate — with no private key, push is disabled and the rest of Argus runs unaffected. The
  # PUBLIC key is non-secret and the same one committed in .env.example; the PRIVATE key is set only
  # in the real .env. The browser fetches the public key from GET /api/push/key.
  push:
    vapid:
      public-key: ${ARGUS_PUSH_VAPID_PUBLIC:}
      private-key: ${ARGUS_PUSH_VAPID_PRIVATE:}
      subject: ${ARGUS_PUSH_VAPID_SUBJECT:mailto:argus@localhost}

  # Morning Briefing (Epic 8, FR-16). Local-model narrative generated on a daily schedule
  # (08:00 America/Toronto) and pushed to all devices. overnight-hours is the look-back window for
  # the "news while you slept" count.
  briefing:
    cron: ${ARGUS_BRIEFING_CRON:0 0 8 * * *}
    overnight-hours: ${ARGUS_BRIEFING_OVERNIGHT_HOURS:16}

  # Alert discipline (Epic 8, FR-18/19/20). The fatigue gate floors (non-critical alerts only) and
  # the dedup window for collapsing repeats of the same ticker+direction.
  notification:
    min-confidence: ${ARGUS_NOTIFICATION_MIN_CONFIDENCE:0.60}
    min-portfolio-impact: ${ARGUS_NOTIFICATION_MIN_PORTFOLIO_IMPACT:0.02}
    dedup-window-seconds: ${ARGUS_NOTIFICATION_DEDUP_WINDOW_SECONDS:1800}

  # Operations dashboards (Epic 9). data-dir is the filesystem whose free/total space represents the
  # data SSD (the Mini's 256GB volume; defaults to root). agent-broadcast-ms is how often the agent
  # fleet snapshot is pushed to /topic/agents for the live Agents view.
  ops:
    data-dir: ${ARGUS_OPS_DATA_DIR:/}
    agent-broadcast-ms: ${ARGUS_OPS_AGENT_BROADCAST_MS:15000}

  # Degraded Mode coordinator (Epic 10, Story 10.4 / GAP-3). probe-url is HEAD-checked every probe-ms
  # to detect internet loss; two consecutive failures flip the platform into DEGRADED.
  resilience:
    probe-url: ${ARGUS_RESILIENCE_PROBE_URL:https://one.one.one.one}
    probe-ms: ${ARGUS_RESILIENCE_PROBE_MS:30000}

  # Cost Governor (Epic 10, Story 10.5/10.6). monthly-usd is the budget ceiling; watch-ms is how often
  # BudgetWatcher checks the band to fire 70/80/95% alerts.
  budget:
    monthly-usd: ${ARGUS_BUDGET_MONTHLY_USD:20}
    watch-ms: ${ARGUS_BUDGET_WATCH_MS:1800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
