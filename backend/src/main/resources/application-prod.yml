# prod profile — Mac Mini. The Model Gateway routes to Gemma 4 26B MoE via Ollama
# (running natively on the host). NOT exercised on the dev laptop (16GB).
#
# The exact Ollama model tag is provisional pending Story 1.3 (the RAM/latency spike
# on the Mini) — override via ARGUS_BIG_MODEL once validated.
spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${ARGUS_BIG_MODEL:gemma3:27b}
          keep-alive: ${ARGUS_MODEL_KEEP_ALIVE:10m}

argus:
  model:
    concurrency: 1                       # big model serialized (Decision 1)
    keep-alive: ${ARGUS_MODEL_KEEP_ALIVE:10m}
    big-model: ${ARGUS_BIG_MODEL:gemma3:27b}
