# prod profile — Mac Mini. The Model Gateway routes to Gemma 4 26B MoE via Ollama
# (running natively on the host). NOT exercised on the dev laptop (16GB).
#
# Model tag + keep-alive validated by Story 1.3 (RAM/latency spike on the Mini,
# 2026-06-21): gemma4:26b (~17GB resident, ~22 tok/s, warm first-token <1s) with
# an unload-when-idle keep-alive of 5m. The 26B resident + full stack overflows
# the 28GB Mini into swap, so the model is deliberately NOT pinned — it loads on
# demand (28s cold-load accepted) and frees ~17GB when idle. Override via env.
spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${ARGUS_BIG_MODEL:gemma4:26b}
          keep-alive: ${ARGUS_MODEL_KEEP_ALIVE:5m}
          # Hard cap on generated tokens (Mini validation, 2026-07-16). Without one, worst-case
          # latency is UNBOUNDED: the custom-imported gemma4 tags ship with no stop sequence
          # (confirmed via a raw Ollama call bypassing the backend — docs/mac-mini-validation.md §3),
          # so a trivial 3-word answer generated 556 tokens of runaway fake-conversation before
          # happening to stop on its own, and some calls never returned at all (60-180s+, HTTP 000).
          # A real grounded chat answer (portfolio + investor profile + calendar context) can
          # legitimately need ~700-900 tokens — a lower cap (512, tried first) silently truncated
          # genuine answers into emptiness rather than skipping past junk. At the measured
          # ~12 tok/s, 1024 covers real answers with room to spare while still bounding the true
          # worst case to roughly 85s instead of unbounded/never.
          num-predict: ${ARGUS_MODEL_MAX_TOKENS:1024}

argus:
  model:
    concurrency: 1                       # big model serialized (Decision 1)
    # keep-alive / big-model below are informational only — the EFFECTIVE values are the
    # spring.ai.ollama.chat.options.* keys above. Kept for a future gateway-owned config move.
    keep-alive: ${ARGUS_MODEL_KEEP_ALIVE:5m}
    big-model: ${ARGUS_BIG_MODEL:gemma4:26b}
