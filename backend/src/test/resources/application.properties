# Test-only overrides. This layers on top of src/main/resources/application.yml (different filename,
# so it does NOT shadow it) and wins per-key. Keep it minimal.
#
# Hermeticity: disable the live external news sources so the @Scheduled ingest cycle never makes
# outbound HTTP from a test JVM (Finnhub is already key-gated off; this covers GDELT + RSS).
argus.news.gdelt.enabled=false
argus.news.rss.enabled=false
# Never seed sample intelligence data during tests (it would pollute count assertions).
argus.dev.seed=false
