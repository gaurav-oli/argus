# Test-only, dev-profile override. Profile-specific properties outrank the non-profile
# application.properties, so the dev-seed toggle (set in src/main/.../application-dev.yml) must be
# disabled here — otherwise DevDataSeeder would run during @ActiveProfiles("dev") tests and pollute
# their data. This .properties layers over the main application-dev.yml (it does not shadow it).
argus.dev.seed=false
