# Argus — Docker Compose.
#
# DEV (laptop):   docker compose up -d            → Postgres + Redis ONLY.
#                 Backend runs via `mvn spring-boot:run`, frontend via `npm run dev`.
# DEPLOY (Mini):  docker compose --profile deploy up -d --build
#                 → adds the backend + frontend containers (full stack).
#                 Ollama runs NATIVELY on the host (never containerized — no Metal
#                 passthrough in Docker); containers reach it via host.docker.internal.
#
# The backend/frontend services are gated behind the `deploy` profile so the dev
# workflow above is unchanged. See docs/deploy-runbook.md for the full procedure.
#
# Usage: cp .env.example .env  (set POSTGRES_PASSWORD), then run one of the above.

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18   # PostgreSQL 18 + pgvector 0.8.2
    container_name: argus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    ports:
      - "127.0.0.1:5432:5432"   # loopback only — not exposed to the network
    volumes:
      # PG18+ images store data in a major-version subdir, so mount at
      # /var/lib/postgresql (NOT /var/lib/postgresql/data, which errors on boot).
      - argus-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus} -d ${POSTGRES_DB:-argus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    container_name: argus-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # loopback only — Redis runs unauthenticated locally
    volumes:
      - argus-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----- deploy profile (Mac Mini full stack) -----

  backend:
    profiles: ["deploy"]
    build: ./backend
    image: argus-backend:local
    container_name: argus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Reach the DB/cache by compose service name (the app defaults to localhost).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-argus}
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Ollama runs natively on the host, not in a container.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ARGUS_BIG_MODEL: ${ARGUS_BIG_MODEL:-gemma4:26b}   # validated by Story 1.3 (2026-06-21)
      ARGUS_MODEL_KEEP_ALIVE: ${ARGUS_MODEL_KEEP_ALIVE:-5m}   # unload-when-idle (frees ~17GB)
      # Investor staggered paper-trade horizons (argus.paper-investor.horizon-days-list). One leg per
      # horizon per thesis (7d legs give feedback within a week; 30/90 measure the longer timeframes).
      ARGUS_PAPER_INVESTOR_HORIZON_DAYS_LIST: ${PAPER_INVESTOR_HORIZON_DAYS_LIST:-7,30,90}
      # Legacy single-horizon validation knob (argus.paper-investor.horizon-days). When set (>0) it
      # replaces the list — e.g. 2 to watch trades close quickly during validation. Leave 0 for prod.
      ARGUS_PAPER_INVESTOR_HORIZON_DAYS: ${PAPER_INVESTOR_HORIZON_DAYS:-0}
      # How often the Investor marks due positions to market (argus.paper-investor.close-cron). Default
      # hourly; set e.g. "0 * * * * *" (every minute) during validation so backdated trades close promptly.
      ARGUS_PAPER_INVESTOR_CLOSE_CRON: ${PAPER_INVESTOR_CLOSE_CRON:-0 0 * * * *}
      # Adaptive-tuning cold-start floor (argus.adaptive-tuning.min-sample). Default 10; below this many
      # closed trades an agent's weight multiplier stays 1.0. Lower it to watch tuning move during validation.
      ARGUS_ADAPTIVE_TUNING_MIN_SAMPLE: ${ADAPTIVE_TUNING_MIN_SAMPLE:-10}
      # Also recompute tuning once at startup (default off) — validate the loop without the nightly wait.
      ARGUS_ADAPTIVE_TUNING_RECOMPUTE_ON_BOOT: ${ADAPTIVE_TUNING_RECOMPUTE_ON_BOOT:-false}
      # Analyst Logic Review schedule (argus.logic-review.cron). Default 03:00; set e.g. "0 */2 * * * *"
      # (every 2 min) during validation so the LLM-proposes/backtest-decides pass fires promptly.
      ARGUS_LOGIC_REVIEW_CRON: ${LOGIC_REVIEW_CRON:-0 0 3 * * *}
      # Internet-buzz agent frozen (Fable 5 review): noisiest, hard-capped signal — paused until one
      # full tuning cycle on clean trade data proves/disproves it. Set true to resume polling.
      ARGUS_INTERNET_ENABLED: ${ARGUS_INTERNET_ENABLED:-false}
      # Smart Cleanup schedule (argus.cleanup.cron). Default monthly (04:00 on the 1st, Toronto);
      # set "-" to disable and go back to the manual Agents-page button.
      ARGUS_CLEANUP_CRON: ${ARGUS_CLEANUP_CRON:-0 0 4 1 * *}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Haiku output cap (argus.haiku.max-tokens). Raised from the 1024 default so the LLM-assisted
      # statement parser can return a full multi-account holdings JSON. It's a ceiling, not a fixed
      # cost — chat answers still use only what they need.
      ARGUS_HAIKU_MAX_TOKENS: ${ARGUS_HAIKU_MAX_TOKENS:-4096}
      # Agent 6 (Cost Governor): monthly paid-API budget in USD. At 95% it auto-switches escalations
      # to the local model. Set 0 to disable governance (unlimited).
      ARGUS_BUDGET_MONTHLY_USD: ${BUDGET_MONTHLY_USD:-20}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # The Finnhub beans gate on the Spring property `argus.finnhub.api-key`; relaxed binding
      # populates it from ARGUS_FINNHUB_API_KEY (NOT FINNHUB_API_KEY). When no key is set this is an
      # empty string — the beans use @ConditionalOnExpression to require a NON-EMPTY value, so empty
      # safely means "off" (degrade to free GDELT/RSS), matching the no-key design.
      ARGUS_FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # Agent 2 (social). StockTwits works with no key; the token just raises its rate limit. Reddit
      # is key-gated (RedditSource requires a non-empty client id). Relaxed-binding aliases.
      ARGUS_STOCKTWITS_ACCESS_TOKEN: ${STOCKTWITS_ACCESS_TOKEN:-}
      ARGUS_REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      ARGUS_REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      ARGUS_REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-Argus/1.0}
      # Agent 4 (SEC EDGAR). No key — just a descriptive User-Agent (SEC requires the header).
      ARGUS_SEC_USER_AGENT: ${SEC_EDGAR_USER_AGENT:-Argus/1.0 (argus@example.com)}
      # Epic 8 Web Push (FR-17). Spring binds argus.push.vapid.{public-key,private-key,subject};
      # bridge those from the shorter .env names. Empty keys = push disabled (app runs fine).
      ARGUS_PUSH_VAPID_PUBLIC_KEY: ${ARGUS_PUSH_VAPID_PUBLIC:-}
      ARGUS_PUSH_VAPID_PRIVATE_KEY: ${ARGUS_PUSH_VAPID_PRIVATE:-}
      ARGUS_PUSH_VAPID_SUBJECT: ${ARGUS_PUSH_VAPID_SUBJECT:-mailto:argus@localhost}
      # Browser origins allowed to call the API (CORS). On the Mini = the tailnet host, since
      # tailscale serve makes same-origin POSTs look cross-origin to the backend (Story 2.1).
      ARGUS_WEB_ALLOWED_ORIGINS: ${ARGUS_WEB_ALLOWED_ORIGINS:-http://localhost:3000}
      # WebAuthn/passkey RP (Story 2.2). On the Mini these are the tailnet host (RP ID = the host,
      # origin = https://<host>). Defaults suit local dev.
      ARGUS_SECURITY_WEBAUTHN_RP_ID: ${ARGUS_SECURITY_WEBAUTHN_RP_ID:-localhost}
      ARGUS_SECURITY_WEBAUTHN_ORIGINS: ${ARGUS_SECURITY_WEBAUTHN_ORIGINS:-http://localhost:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach native Ollama
    ports:
      - "127.0.0.1:8080:8080"   # loopback only — fronted by Tailscale serve
    healthcheck:
      # JRE image has no curl/wget; use a bash /dev/tcp port probe.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    profiles: ["deploy"]
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* are inlined at build time. Defaults suit local verification;
        # on the Mini set these in .env to the single-origin Tailscale values
        # (empty API base → same-origin /api; wss URL for the tailnet host).
        # NOTE: API base uses `-` (not `:-`) so a SET-but-EMPTY value is honored
        # (same-origin). `:-` would rewrite empty back to localhost and break the deploy.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}
    image: argus-frontend:local
    container_name: argus-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — fronted by Tailscale serve
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  argus-pgdata:
  argus-redisdata:
